name: Production daily readiness
run-name: Validate daily production contract ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/config/production-daily.json"
      - "automation/scripts/production_daily_common.py"
      - "automation/scripts/prepare_production_daily.py"
      - "automation/scripts/create_production_image_request.py"
      - "automation/scripts/normalize_production_rss.py"
      - "automation/scripts/build_site.py"
      - "automation/scripts/validate_site.py"
      - "automation/scripts/bootstrap_archive.py"
      - "automation/scripts/stage_legacy_images.py"
      - "automation/scripts/promote_production_site.py"
      - "automation/scripts/validate_production_daily_contract.py"
      - "automation/config/structured-data.json"
      - "automation/scripts/inject_blogposting_schema.py"
      - "automation/scripts/validate_structured_data.py"
      - "automation/scripts/build_posts_sitemap.py"
      - "automation/scripts/validate_posts_sitemap.py"
      - "automation/tests/test_structured_data.py"
      - "automation/tests/test_posts_sitemap.py"
      - "automation/tests/test_production_daily.py"
      - "automation/tests/test_build_site_legacy.py"
      - "automation/tests/test_bootstrap_archive.py"
      - "automation/specs/production-daily.md"
      - ".github/workflows/production-daily-readiness.yml"
      - ".github/workflows/daily-production.yml"
      - "posts/rss.xml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile production code
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/production_daily_common.py \
            automation/scripts/prepare_production_daily.py \
            automation/scripts/create_production_image_request.py \
            automation/scripts/normalize_production_rss.py \
            automation/scripts/build_site.py \
            automation/scripts/validate_site.py \
            automation/scripts/bootstrap_archive.py \
            automation/scripts/stage_legacy_images.py \
            automation/scripts/promote_production_site.py \
            automation/scripts/validate_production_daily_contract.py \
            automation/scripts/inject_blogposting_schema.py \
            automation/scripts/validate_structured_data.py \
            automation/scripts/build_posts_sitemap.py \
            automation/scripts/validate_posts_sitemap.py \
            automation/tests/test_production_daily.py \
            automation/tests/test_build_site_legacy.py \
            automation/tests/test_bootstrap_archive.py \
            automation/tests/test_structured_data.py \
            automation/tests/test_posts_sitemap.py

      - name: Run production unit tests
        run: |
          set -euo pipefail
          python -m unittest -v \
            automation.tests.test_production_daily \
            automation.tests.test_build_site_legacy \
            automation.tests.test_bootstrap_archive \
            automation.tests.test_structured_data \
            automation.tests.test_posts_sitemap

      - name: Validate legacy image migration without changing posts
        run: |
          set -euo pipefail
          mkdir -p automation/preview/production-readiness
          python automation/scripts/stage_legacy_images.py \
            --source posts/dzen-test/images \
            --target posts/images \
            --report automation/preview/production-readiness/legacy-images.json \
            --dry-run

      - name: Validate current RSS and scheduled workflow
        run: |
          set -euo pipefail
          mkdir -p automation/preview/production-readiness
          python automation/scripts/validate_production_daily_contract.py \
            --config automation/config/production-daily.json \
            --site-config automation/config/site.json \
            --workflow .github/workflows/daily-production.yml \
            --rss posts/rss.xml \
            --report automation/preview/production-readiness/contract.json

      - name: Verify protected paths stayed unchanged
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain -- posts/ automation/requests/)" ]]; then
            echo "Readiness workflow modified protected files." >&2
            git status --short -- posts/ automation/requests/
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: production-daily-readiness-${{ github.sha }}
          path: automation/preview/production-readiness/
          if-no-files-found: warn
          retention-days: 14
