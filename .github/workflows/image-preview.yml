name: Image preview
run-name: Image preview ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/requests/image-preview.json"

permissions:
  contents: read

concurrency:
  group: image-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-image-preview:
    name: Generate one isolated image preview
    if: github.ref == 'refs/heads/automation-prep'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-2' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out automation-prep
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate safe execution context
        id: request
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/automation-prep" ]]; then
            echo "Этот workflow разрешён только для automation-prep." >&2
            exit 1
          fi

          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "Не найден Repository Secret OPENAI_API_KEY." >&2
            exit 1
          fi

          if [[ -z "${OPENAI_IMAGE_MODEL:-}" ]]; then
            echo "OPENAI_IMAGE_MODEL не должен быть пустым." >&2
            exit 1
          fi

          if [[ -n "$(git status --porcelain -- posts/)" ]]; then
            echo "posts/ уже изменён до начала image preview." >&2
            git status --short -- posts/
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from datetime import date
          from pathlib import Path

          request_path = Path("automation/requests/image-preview.json")
          request = json.loads(request_path.read_text(encoding="utf-8"))

          if request.get("enabled") is not True:
              raise SystemExit("image-preview.json: enabled должен быть true")

          value = str(request.get("publication_date", ""))
          parsed = date.fromisoformat(value)
          if parsed.isoformat() != value:
              raise SystemExit("publication_date должна иметь формат YYYY-MM-DD")

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as stream:
              stream.write(f"publication_date={value}\n")
              stream.write(f"request_id={request.get('request_id', '')}\n")

          print(f"Дата: {value}")
          print(f"Request ID: {request.get('request_id')}")
          print(f"Размер: {request.get('size')}")
          print(f"Качество: {request.get('quality')}")
          PY

      - name: Install pinned SDK and image library
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install \
            --disable-pip-version-check \
            "openai==2.45.0" \
            "Pillow==12.3.0"

      - name: Check Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/materialize_fixture_preview.py \
            automation/scripts/generate_image_preview.py \
            automation/scripts/compose_cover.py \
            automation/scripts/validate_image_preview.py \
            automation/scripts/build_site.py \
            automation/scripts/validate_site.py

      - name: Materialize fixture preview
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/materialize_fixture_preview.py \
            --fixture "automation/fixtures/digest-preview/${PUBLICATION_DATE}/digest.json"
        env:
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}

      - name: Generate one image background
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/generate_image_preview.py \
            --request automation/requests/image-preview.json \
            --source-dir "automation/preview/${PUBLICATION_DATE}"
        env:
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}

      - name: Compose exact Russian title
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/compose_cover.py \
            --source-dir "automation/preview/${PUBLICATION_DATE}"
        env:
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}

      - name: Validate generated images
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/validate_image_preview.py \
            --request automation/requests/image-preview.json \
            --source-dir "automation/preview/${PUBLICATION_DATE}"
        env:
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}

      - name: Build isolated static site with real cover
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/build_site.py \
            --source-dir "automation/preview/${PUBLICATION_DATE}"
        env:
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}

      - name: Validate HTML, RSS and real cover
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/validate_site.py \
            --source-dir "automation/preview/${PUBLICATION_DATE}"
        env:
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}

      - name: Verify that live posts were not changed
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "$(git status --porcelain -- posts/)" ]]; then
            echo "Защитная проверка: image preview изменил posts/." >&2
            git status --short -- posts/
            exit 1
          fi

          echo "Рабочий каталог posts/ не изменён."

      - name: Upload image preview artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: image-preview-${{ steps.request.outputs.publication_date }}-${{ github.sha }}
          path: |
            automation/requests/image-preview.json
            automation/preview/${{ steps.request.outputs.publication_date }}/
            automation/preview/posts/
            automation/preview/build-info.json
            automation/preview/site-validation.json
          if-no-files-found: warn
          retention-days: 7
