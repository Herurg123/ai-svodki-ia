name: Editorial policy check

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/config/editorial.json"
      - "automation/config/site.json"
      - "automation/prompts/**"
      - "automation/scripts/**"
      - "automation/specs/**"
      - "automation/tests/**"
      - "automation/fixtures/**"
      - ".github/workflows/editorial-policy-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON configuration
        run: |
          python -m json.tool automation/config/editorial.json >/dev/null
          python -m json.tool automation/config/site.json >/dev/null

      - name: Compile policy scripts
        run: |
          python -m py_compile \
            automation/scripts/editorial_policy.py \
            automation/scripts/validate_editorial_contract.py \
            automation/scripts/generate_digest_preview.py \
            automation/scripts/bootstrap_archive.py \
            automation/scripts/validate_archive.py \
            automation/scripts/materialize_fixture_preview.py \
            automation/scripts/build_site.py \
            automation/scripts/validate_site.py

      - name: Validate editorial contract
        run: python automation/scripts/validate_editorial_contract.py

      - name: Run policy unit tests
        run: python -m unittest discover -s automation/tests -v

      - name: Materialize fixture without external API
        run: python automation/scripts/materialize_fixture_preview.py
