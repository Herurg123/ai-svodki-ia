name: Deploy posts to rybalka.one

on:
  workflow_call:
    inputs:
      ref:
        description: "Exact commit SHA or ref to deploy"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or ref to deploy"
        required: false
        default: main
        type: string
  push:
    branches:
      - main
    paths:
      - "posts/**"

permissions:
  contents: read

concurrency:
  group: deploy-posts-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository revision
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.sha }}

      - name: Validate production branch and payload
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "FTP deployment is allowed only from main." >&2
            exit 1
          fi
          if [[ ! -d "posts" ]]; then
            echo "Local posts/ directory is missing." >&2
            exit 1
          fi
          echo "Deploying commit $(git rev-parse HEAD)"

      - name: Deploy posts through FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./posts/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            dzen-test/**
