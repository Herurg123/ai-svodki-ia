name: Deploy posts to rybalka.one

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "posts/**"
      - ".github/workflows/deploy-posts.yml"

permissions:
  contents: read

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate production branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "FTP deployment is allowed only from main." >&2
            exit 1
          fi

          if [[ ! -d "posts" ]]; then
            echo "Local posts/ directory is missing." >&2
            exit 1
          fi

      - name: Deploy posts through FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftp
          port: 21

          local-dir: ./posts/
          server-dir: ./
