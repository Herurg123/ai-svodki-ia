name: Daily orchestrator artifact-only replay

run-name: Recorded daily pipeline replay ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/config/daily-orchestrator.json"
      - "automation/config/image.json"
      - "automation/config/release.json"
      - "automation/config/site.json"
      - "automation/fixtures/daily-orchestrator/**"
      - "automation/fixtures/research/2026-07-11/**"
      - "automation/fixtures/editorial/2026-07-11/**"
      - "automation/fixtures/release/2026-07-11/**"
      - "automation/scripts/daily_orchestrator_common.py"
      - "automation/scripts/materialize_daily_orchestrator_replay.py"
      - "automation/scripts/finalize_daily_orchestrator_replay.py"
      - "automation/scripts/validate_daily_orchestrator_replay.py"
      - "automation/scripts/validate_digest_artifact.py"
      - "automation/scripts/validate_cover_contract.py"
      - "automation/scripts/materialize_release_candidate.py"
      - "automation/scripts/build_site.py"
      - "automation/scripts/validate_site.py"
      - "automation/scripts/validate_dzen_feed.py"
      - "automation/scripts/create_release_manifest.py"
      - "automation/scripts/validate_release_candidate.py"
      - "automation/scripts/validate_production_gate.py"
      - "automation/scripts/validate_workflow_safety.py"
      - "automation/scripts/release_common.py"
      - "automation/tests/test_daily_orchestrator_replay.py"
      - "automation/specs/daily-orchestrator-replay.md"
      - ".github/workflows/daily-orchestrator-artifact-only.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-orchestrator-replay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    name: Replay research to release candidate without APIs
    if: github.ref == 'refs/heads/automation-prep'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository read-only
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile replay and validation code
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/daily_orchestrator_common.py \
            automation/scripts/materialize_daily_orchestrator_replay.py \
            automation/scripts/finalize_daily_orchestrator_replay.py \
            automation/scripts/validate_daily_orchestrator_replay.py \
            automation/tests/test_daily_orchestrator_replay.py

      - name: Run replay unit tests
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest -v automation.tests.test_daily_orchestrator_replay

      - name: Materialize recorded research editorial and image stages
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          rm -rf "${root}"
          python automation/scripts/materialize_daily_orchestrator_replay.py \
            --config automation/config/daily-orchestrator.json \
            --output-dir "${root}" \
            --report "${root}/materialization.json"

      - name: Validate replayed editorial and image stages
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          python automation/scripts/validate_digest_artifact.py \
            --artifact-dir "${root}/editorial" \
            --report "${root}/editorial-validation.json"
          python automation/scripts/validate_cover_contract.py \
            --artifact-dir "${root}/image" \
            --report "${root}/image-validation.json"

      - name: Materialize release source from accepted fixtures
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          python automation/scripts/materialize_release_candidate.py \
            --release-fixture automation/fixtures/release/2026-07-11 \
            --editorial-source automation/fixtures/editorial/2026-07-11 \
            --output-dir "${root}/release/source" \
            --report "${root}/release/materialization.json"
          python automation/scripts/validate_digest_artifact.py \
            --artifact-dir "${root}/release/source" \
            --report "${root}/release/editorial-artifact-validation.json"
          python automation/scripts/validate_cover_contract.py \
            --artifact-dir "${root}/release/source" \
            --report "${root}/release/cover-validation.json"

      - name: Build and validate isolated site and RSS
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          python automation/scripts/build_site.py \
            --source-dir "${root}/release/source" \
            --output-dir "${root}/release/site/posts" \
            --build-info "${root}/release/build-info.json"
          python automation/scripts/validate_site.py \
            --source-dir "${root}/release/source" \
            --site-dir "${root}/release/site/posts" \
            --report "${root}/release/site-validation.json"
          python automation/scripts/validate_dzen_feed.py \
            --rss "${root}/release/site/posts/rss.xml" \
            --report "${root}/release/dzen-feed-validation.json"

      - name: Create and validate release candidate
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          python automation/scripts/create_release_manifest.py \
            --source-dir "${root}/release/source" \
            --site-dir "${root}/release/site/posts" \
            --reports-dir "${root}/release" \
            --output "${root}/release/release-manifest.json"
          python automation/scripts/validate_release_candidate.py \
            --manifest "${root}/release/release-manifest.json" \
            --report "${root}/release/release-validation.json"

      - name: Confirm production gate is blocked
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          python automation/scripts/validate_production_gate.py \
            --config automation/config/release.json \
            --manifest "${root}/release/release-manifest.json" \
            --actual-ref "${GITHUB_REF}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --manual-approval false \
            --expect-blocked \
            --report "${root}/release/gate-report.json"

      - name: Validate workflow has no publishing capability
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          python automation/scripts/validate_workflow_safety.py \
            --workflow .github/workflows/daily-orchestrator-artifact-only.yml \
            --report "${root}/workflow-safety.json"

      - name: Finalize and validate unified daily replay
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/daily-orchestrator/2026-07-11"
          python automation/scripts/finalize_daily_orchestrator_replay.py \
            --run-dir "${root}" \
            --output "${root}/daily-run-manifest.json"
          python automation/scripts/validate_daily_orchestrator_replay.py \
            --config automation/config/daily-orchestrator.json \
            --manifest "${root}/daily-run-manifest.json" \
            --report "${root}/daily-run-validation.json"

      - name: Verify protected paths stayed unchanged
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          protected=(
            posts/
            automation/requests/digest-preview.json
            automation/requests/image-preview.json
          )
          if [[ -n "$(git status --porcelain -- "${protected[@]}")" ]]; then
            echo "Daily replay modified protected paths." >&2
            git status --short -- "${protected[@]}"
            exit 1
          fi
          echo "Protected paths are unchanged."

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Daily orchestrator artifact-only replay"
            echo
            echo "- Research: recorded fixture replay"
            echo "- Editorial: editorial-resume-004 replay"
            echo "- Image: image-preview-2026-07-11-002 replay"
            echo "- Release candidate: validated"
            echo "- Production gate: blocked"
            echo "- Web search calls: 0"
            echo "- Responses API calls: 0"
            echo "- Image API calls: 0"
            echo "- FTP: not used"
            echo "- Production posts: unchanged"
            echo "- Output: GitHub artifact only"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload unified daily replay artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-orchestrator-replay-${{ github.sha }}
          path: automation/preview/daily-orchestrator/2026-07-11/
          if-no-files-found: warn
          retention-days: 14
