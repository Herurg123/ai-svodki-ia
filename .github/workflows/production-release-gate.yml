name: Production release gate (disabled)
run-name: Verify production remains blocked ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/config/release.json"
      - "automation/fixtures/release/2026-07-11/release-gate-sample.json"
      - "automation/scripts/release_common.py"
      - "automation/scripts/validate_production_gate.py"
      - "automation/tests/test_release_candidate.py"
      - ".github/workflows/production-release-gate.yml"
  workflow_dispatch:
    inputs:
      manual_approval:
        description: "Must remain false while production is frozen"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blocked:
    name: Confirm production publication is disabled
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository read-only
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate disabled production gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_APPROVAL: ${{ inputs.manual_approval || 'false' }}
        run: |
          set -euo pipefail
          mkdir -p automation/preview/production-gate
          python automation/scripts/validate_production_gate.py \
            --config automation/config/release.json \
            --manifest automation/fixtures/release/2026-07-11/release-gate-sample.json \
            --actual-ref "${GITHUB_REF}" \
            --event-name "${EVENT_NAME}" \
            --manual-approval "${MANUAL_APPROVAL}" \
            --expect-blocked \
            --report automation/preview/production-gate/gate-report.json

      - name: Verify workflow has no publishing capability
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          text = Path(".github/workflows/production-release-gate.yml").read_text(encoding="utf-8")
          forbidden = [
              "FTP_" + "SERVER",
              "FTP_" + "USERNAME",
              "FTP_" + "PASSWORD",
              "contents:" + " write",
              "git " + "push",
              "FTP-Deploy-" + "Action",
          ]
          found = [value for value in forbidden if value in text]
          if found:
              raise SystemExit(f"Publishing capability detected: {found}")
          print("No FTP secrets, write permission, deploy action or git push found.")
          PY

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Production release gate"
            echo
            echo "- Status: blocked by design"
            echo "- production_enabled: false"
            echo "- Golden fixture publication: forbidden"
            echo "- FTP secrets: unavailable"
            echo "- contents permission: read"
            echo "- Publication action: absent"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-gate-blocked-${{ github.sha }}
          path: automation/preview/production-gate/
          if-no-files-found: warn
          retention-days: 14
