name: Main CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "automation/**"
      - "posts/**"
      - ".github/workflows/**"
      - "README.md"
      - ".gitignore"
  push:
    branches:
      - main
    paths:
      - "automation/**"
      - "posts/**"
      - ".github/workflows/**"
      - "README.md"
      - ".gitignore"

permissions:
  contents: read

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Offline production checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: |
          set -euo pipefail
          python -m compileall -q automation/scripts automation/tests

      - name: Run unit tests
        run: |
          set -euo pipefail
          python -m unittest discover -s automation/tests -v

      - name: Validate committed archive
        run: |
          set -euo pipefail
          python automation/scripts/validate_archive.py

      - name: Validate production workflow contract
        run: |
          set -euo pipefail
          mkdir -p automation/preview/ci
          python automation/scripts/validate_production_daily_contract.py \
            --config automation/config/production-daily.json \
            --site-config automation/config/site.json \
            --workflow .github/workflows/daily-production.yml \
            --rss posts/rss.xml \
            --report automation/preview/ci/production-contract.json

      - name: Validate RSS, sitemap and structured data
        run: |
          set -euo pipefail
          mkdir -p automation/preview/ci
          python automation/scripts/validate_dzen_feed.py \
            --rss posts/rss.xml \
            --site-base-url https://rybalka.one/posts \
            --report automation/preview/ci/dzen-feed.json
          python automation/scripts/validate_posts_sitemap.py \
            --sitemap posts/sitemap.xml \
            --rss posts/rss.xml \
            --report automation/preview/ci/posts-sitemap.json
          latest_content_dir="$(find automation/content -mindepth 1 -maxdepth 1 -type d -name '????-??-??' | sort | tail -n 1)"
          test -n "${latest_content_dir}"
          python automation/scripts/validate_structured_data.py \
            --source-dir "${latest_content_dir}" \
            --posts-root posts \
            --report automation/preview/ci/structured-data.json

      - name: Verify offline checks did not modify protected paths
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain -- posts/ automation/requests/)" ]]; then
            echo "Offline CI modified protected paths." >&2
            git status --short -- posts/ automation/requests/
            exit 1
          fi

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: main-ci-${{ github.sha }}
          path: automation/preview/ci/
          if-no-files-found: warn
          retention-days: 14
