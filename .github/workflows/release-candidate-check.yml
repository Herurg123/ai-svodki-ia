name: Release candidate check
run-name: Artifact-only release candidate ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/config/release.json"
      - "automation/fixtures/release/**"
      - "automation/scripts/release_common.py"
      - "automation/scripts/materialize_release_candidate.py"
      - "automation/scripts/create_release_manifest.py"
      - "automation/scripts/validate_release_candidate.py"
      - "automation/scripts/validate_production_gate.py"
      - "automation/tests/test_release_candidate.py"
      - "automation/specs/release-candidate.md"
      - ".github/workflows/release-candidate-check.yml"
      - ".github/workflows/production-release-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and validate artifact-only release candidate
    if: github.ref == 'refs/heads/automation-prep'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out automation-prep
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile release code
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/release_common.py \
            automation/scripts/materialize_release_candidate.py \
            automation/scripts/create_release_manifest.py \
            automation/scripts/validate_release_candidate.py \
            automation/scripts/validate_production_gate.py \
            automation/tests/test_release_candidate.py

      - name: Run release unit tests
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest -v automation.tests.test_release_candidate

      - name: Materialize accepted golden source
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/release-candidate/2026-07-11"
          rm -rf "${root}"
          mkdir -p "${root}"
          python automation/scripts/materialize_release_candidate.py \
            --release-fixture automation/fixtures/release/2026-07-11 \
            --editorial-source automation/fixtures/editorial/2026-07-11 \
            --output-dir "${root}/source" \
            --report "${root}/materialization.json"

      - name: Validate complete digest and cover
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/release-candidate/2026-07-11"
          python automation/scripts/validate_digest_artifact.py \
            --artifact-dir "${root}/source" \
            --report "${root}/editorial-artifact-validation.json"
          python automation/scripts/validate_cover_contract.py \
            --artifact-dir "${root}/source" \
            --report "${root}/cover-validation.json"

      - name: Build isolated release site and RSS
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/release-candidate/2026-07-11"
          python automation/scripts/build_site.py \
            --source-dir "${root}/source" \
            --output-dir "${root}/site/posts" \
            --build-info "${root}/build-info.json"
          python automation/scripts/validate_site.py \
            --source-dir "${root}/source" \
            --site-dir "${root}/site/posts" \
            --report "${root}/site-validation.json"
          python automation/scripts/validate_dzen_feed.py \
            --rss "${root}/site/posts/rss.xml" \
            --report "${root}/dzen-feed-validation.json"

      - name: Create and validate release manifest
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          root="automation/preview/release-candidate/2026-07-11"
          python automation/scripts/create_release_manifest.py \
            --source-dir "${root}/source" \
            --site-dir "${root}/site/posts" \
            --reports-dir "${root}" \
            --output "${root}/release-manifest.json"
          python automation/scripts/validate_release_candidate.py \
            --manifest "${root}/release-manifest.json" \
            --report "${root}/release-validation.json"

      - name: Verify production and request paths stayed unchanged
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          protected=(
            posts/
            automation/requests/digest-preview.json
            automation/requests/image-preview.json
          )
          if [[ -n "$(git status --porcelain -- "${protected[@]}")" ]]; then
            echo "Release candidate workflow modified protected paths." >&2
            git status --short -- "${protected[@]}"
            exit 1
          fi
          echo "Production and paid request paths are unchanged."

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Artifact-only release candidate"
            echo
            echo "- Fixture: 2026-07-11 golden test"
            echo "- Production eligible: no"
            echo "- OpenAI API: not used"
            echo "- FTP: not used"
            echo "- posts/: unchanged"
            echo "- Output: GitHub artifact only"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload release candidate artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-2026-07-11-${{ github.sha }}
          path: automation/preview/release-candidate/2026-07-11/
          if-no-files-found: warn
          retention-days: 14
