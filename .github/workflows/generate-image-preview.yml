name: Generate image preview
run-name: Image preview ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/requests/image-preview.json"

permissions:
  contents: read

concurrency:
  group: image-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate one artifact-only cover
    if: github.ref == 'refs/heads/automation-prep'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile preflight and generation code
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/validate_image_request_preflight.py \
            automation/scripts/generate_image_preview.py \
            automation/scripts/validate_cover_contract.py \
            automation/scripts/validate_digest_artifact.py \
            automation/scripts/build_site.py \
            automation/scripts/validate_site.py \
            automation/scripts/validate_dzen_feed.py

      - name: Validate paid image request before API
        id: preflight
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          python automation/scripts/validate_image_request_preflight.py \
            --before-sha "${BEFORE_SHA}" \
            --current-sha "${GITHUB_SHA}" \
            --actual-ref "${GITHUB_REF}" \
            --report automation/preview/image-preflight/request-preflight.json \
            --github-output "${GITHUB_OUTPUT}"

      - name: Revalidate editorial artifact before API
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/validate_digest_artifact.py \
            --artifact-dir "${{ steps.preflight.outputs.source }}" \
            --report automation/preview/image-preflight/editorial-artifact-validation.json

      - name: Validate Image API configuration
        shell: bash
        env:
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path("automation/config/image.json").read_text(encoding="utf-8"))
          expected = str(config["target_model"])
          actual = os.environ.get("OPENAI_IMAGE_MODEL", "")
          if actual != expected:
              raise SystemExit(
                  f"OPENAI_IMAGE_MODEL must equal {expected!r}; received {actual!r}"
              )
          if (int(config["width"]), int(config["height"])) != (1536, 864):
              raise SystemExit("Image size must remain 1536x864")
          if config["quality"] != "high" or config["output_format"] != "png":
              raise SystemExit("Image quality/format contract changed")
          print("Image API configuration: ok")
          PY

      - name: Verify OpenAI key is available
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "OPENAI_API_KEY is missing." >&2
            exit 1
          fi
          echo "OPENAI_API_KEY is configured."

      - name: Generate one cover through Image API
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
        run: |
          set -euo pipefail
          output_dir="automation/preview/image-api/${{ steps.preflight.outputs.publication_date }}"
          python automation/scripts/generate_image_preview.py \
            --source-dir "${{ steps.preflight.outputs.source }}" \
            --output-dir "${output_dir}" \
            --request automation/requests/image-preview.json \
            --model "${OPENAI_IMAGE_MODEL}"

      - name: Validate real PNG contract
        shell: bash
        run: |
          set -euo pipefail
          output_dir="automation/preview/image-api/${{ steps.preflight.outputs.publication_date }}"
          python automation/scripts/validate_cover_contract.py \
            --artifact-dir "${output_dir}" \
            --report "${output_dir}/cover-validation.json"

      - name: Build isolated site and RSS with real cover
        shell: bash
        run: |
          set -euo pipefail
          source_dir="automation/preview/image-api/${{ steps.preflight.outputs.publication_date }}"
          site_root="automation/preview/image-api-e2e"
          python automation/scripts/build_site.py \
            --source-dir "${source_dir}" \
            --output-dir "${site_root}/posts" \
            --build-info "${site_root}/build-info.json"
          python automation/scripts/validate_site.py \
            --source-dir "${source_dir}" \
            --site-dir "${site_root}/posts" \
            --report "${site_root}/site-validation.json"
          python automation/scripts/validate_dzen_feed.py \
            --rss "${site_root}/posts/rss.xml" \
            --report "${site_root}/dzen-feed-validation.json"

      - name: Verify protected paths stayed unchanged
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          protected=(
            posts/
            automation/requests/digest-preview.json
            automation/requests/image-preview.json
          )
          if [[ -n "$(git status --porcelain -- "${protected[@]}")" ]]; then
            echo "Image workflow modified production or request files." >&2
            git status --short -- "${protected[@]}"
            exit 1
          fi
          echo "Production and request files are unchanged."

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Image API preview"
            echo
            echo "- Request: ${{ steps.preflight.outputs.request_id }}"
            echo "- Editorial source: ${{ steps.preflight.outputs.editorial_request_id }}"
            echo "- Publication date: ${{ steps.preflight.outputs.publication_date }}"
            echo "- Model: ${{ vars.OPENAI_IMAGE_MODEL }}"
            echo "- Requested size: 1536x864"
            echo "- Quality: high"
            echo "- API calls requested by script: 1"
            echo "- Automatic retries: 0"
            echo "- FTP: not used"
            echo "- Production paths changed: no"
            echo "- Visual semantics validated automatically: false"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload complete image preview artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: image-preview-${{ steps.preflight.outputs.request_id }}-${{ github.sha }}
          path: |
            automation/preview/image-preflight/
            automation/preview/image-api/
            automation/preview/image-api-e2e/
          if-no-files-found: warn
          retention-days: 7
