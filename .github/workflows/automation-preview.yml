name: Automation preview

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/**"
      - ".github/workflows/automation-preview.yml"

permissions:
  contents: read

jobs:
  build-archive-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build archive index
        run: python automation/scripts/bootstrap_archive.py

      - name: Validate archive index
        run: python automation/scripts/validate_archive.py

      - name: Upload generated archive
        uses: actions/upload-artifact@v7
        with:
          name: automation-archive-preview
          path: automation/archive/index.json
          if-no-files-found: error
          retention-days: 7
