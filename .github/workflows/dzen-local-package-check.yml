name: Dzen local ten-article package check
on:
  workflow_dispatch:
  push:
    branches: [automation-prep]
    paths:
      - 'posts/dzen-test/**'
      - 'automation/scripts/validate_dzen_local_package.py'
      - '.github/workflows/dzen-local-package-check.yml'
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate local-only Dzen package
        run: |
          python automation/scripts/validate_dzen_local_package.py \
            --root posts/dzen-test \
            --report dzen-local-package-validation.json
      - uses: actions/upload-artifact@v4
        with:
          name: dzen-local-package-${{ github.sha }}
          path: dzen-local-package-validation.json
          if-no-files-found: error
