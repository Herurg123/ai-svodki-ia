name: Generate two-stage digest preview

run-name: Two-stage digest preview ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/requests/digest-preview.json"

permissions:
  contents: read

concurrency:
  group: two-stage-digest-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-preview:
    name: Research candidates and build editorial digest
    if: github.ref == 'refs/heads/automation-prep'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_TEXT_MODEL: ${{ vars.OPENAI_TEXT_MODEL || 'gpt-5.6-terra' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out automation-prep
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate request and safe execution context
        id: request
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/automation-prep" ]]; then
            echo "Этот workflow разрешён только для ветки automation-prep." >&2
            exit 1
          fi

          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "Не найден Repository Secret OPENAI_API_KEY." >&2
            exit 1
          fi

          if [[ -z "${OPENAI_TEXT_MODEL:-}" ]]; then
            echo "Repository Variable OPENAI_TEXT_MODEL не должна быть пустой." >&2
            exit 1
          fi

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          from datetime import date
          from pathlib import Path

          request_path = Path("automation/requests/digest-preview.json")
          request = json.loads(request_path.read_text(encoding="utf-8"))

          expected_keys = {
              "enabled",
              "mode",
              "research_input",
              "publication_date",
              "request_id",
              "minimum_candidates",
              "minimum_russian_candidates",
              "maximum_candidates",
              "minimum_selected_stories",
              "maximum_selected_stories",
          }
          actual_keys = set(request)

          if actual_keys != expected_keys:
              missing = sorted(expected_keys - actual_keys)
              extra = sorted(actual_keys - expected_keys)
              raise SystemExit(
                  "digest-preview.json имеет неверный набор полей. "
                  f"Отсутствуют: {missing}; лишние: {extra}"
              )

          if request["enabled"] is not True:
              raise SystemExit("digest-preview.json: enabled должен быть true")

          mode = str(request["mode"])
          if mode not in {"full", "editorial_only"}:
              raise SystemExit("mode должен быть full или editorial_only")

          research_input = request["research_input"]
          if mode == "full":
              if research_input is not None:
                  raise SystemExit(
                      "При mode=full поле research_input должно быть null"
                  )
              research_input_text = ""
          else:
              if not isinstance(research_input, str) or not research_input.strip():
                  raise SystemExit(
                      "При mode=editorial_only research_input должен быть путём"
                  )
              research_path = Path(research_input).resolve()
              allowed_root = Path("automation/fixtures/research").resolve()
              try:
                  research_path.relative_to(allowed_root)
              except ValueError as exc:
                  raise SystemExit(
                      "research_input должен находиться внутри "
                      "automation/fixtures/research/"
                  ) from exc
              if not research_path.is_file():
                  raise SystemExit(
                      f"Файл research_input не найден: {research_input}"
                  )
              research_input_text = research_input

          publication_date = str(request["publication_date"])
          parsed = date.fromisoformat(publication_date)
          if parsed.isoformat() != publication_date:
              raise SystemExit(
                  "publication_date должна иметь строгий формат YYYY-MM-DD"
              )

          request_id = str(request["request_id"])
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", request_id):
              raise SystemExit(
                  "request_id должен содержать только латинские буквы, "
                  "цифры, точку, дефис или подчёркивание"
              )

          numeric_fields = {
              key: request[key]
              for key in (
                  "minimum_candidates",
                  "minimum_russian_candidates",
                  "maximum_candidates",
                  "minimum_selected_stories",
                  "maximum_selected_stories",
              )
          }

          for key, value in numeric_fields.items():
              if isinstance(value, bool) or not isinstance(value, int):
                  raise SystemExit(f"{key} должен быть целым числом")

          if not (
              1
              <= request["minimum_candidates"]
              <= request["maximum_candidates"]
              <= 24
          ):
              raise SystemExit(
                  "Требуется 1 <= minimum_candidates "
                  "<= maximum_candidates <= 24"
              )

          if not (
              0
              <= request["minimum_russian_candidates"]
              <= request["maximum_candidates"]
          ):
              raise SystemExit(
                  "minimum_russian_candidates имеет недопустимое значение"
              )

          if not (
              1
              <= request["minimum_selected_stories"]
              <= request["maximum_selected_stories"]
              <= 15
          ):
              raise SystemExit(
                  "Требуется 1 <= minimum_selected_stories "
                  "<= maximum_selected_stories <= 15"
              )

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as stream:
              stream.write(f"mode={mode}\n")
              stream.write(f"research_input={research_input_text}\n")
              stream.write(f"publication_date={publication_date}\n")
              stream.write(f"request_id={request_id}\n")
              for key, value in numeric_fields.items():
                  stream.write(f"{key}={value}\n")

          print(f"Режим: {mode}")
          print(f"Research input: {research_input_text or 'Responses API'}")
          print(f"Дата выпуска: {publication_date}")
          print(f"Request ID: {request_id}")
          print(json.dumps(numeric_fields, ensure_ascii=False, indent=2))
          PY

      - name: Verify triggering commit did not change live posts
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}")"
          printf '%s\n' "${changed_files}"

          if grep -q '^posts/' <<<"${changed_files}"; then
            echo "Запускающий commit изменяет posts/. Выполнение остановлено." >&2
            exit 1
          fi

      - name: Install pinned OpenAI SDK
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install \
            --disable-pip-version-check \
            "openai==2.45.0"

      - name: Check Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/editorial_policy.py \
            automation/scripts/validate_editorial_contract.py \
            automation/scripts/bootstrap_archive.py \
            automation/scripts/validate_archive.py \
            automation/scripts/generate_digest_preview.py

      - name: Validate editorial contract
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/validate_editorial_contract.py

      - name: Build archive context from current RSS
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/bootstrap_archive.py

      - name: Validate archive context
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/validate_archive.py

      - name: Run requested digest stages
        shell: bash
        env:
          PIPELINE_MODE: ${{ steps.request.outputs.mode }}
          RESEARCH_INPUT: ${{ steps.request.outputs.research_input }}
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}
          DIGEST_REQUEST_ID: ${{ steps.request.outputs.request_id }}
          MINIMUM_CANDIDATES: ${{ steps.request.outputs.minimum_candidates }}
          MINIMUM_RUSSIAN_CANDIDATES: ${{ steps.request.outputs.minimum_russian_candidates }}
          MAXIMUM_CANDIDATES: ${{ steps.request.outputs.maximum_candidates }}
          MINIMUM_SELECTED_STORIES: ${{ steps.request.outputs.minimum_selected_stories }}
          MAXIMUM_SELECTED_STORIES: ${{ steps.request.outputs.maximum_selected_stories }}
        run: |
          set -euo pipefail

          args=(
            --publication-date "${PUBLICATION_DATE}"
            --minimum-candidates "${MINIMUM_CANDIDATES}"
            --minimum-russian-candidates "${MINIMUM_RUSSIAN_CANDIDATES}"
            --maximum-candidates "${MAXIMUM_CANDIDATES}"
            --minimum-selected-stories "${MINIMUM_SELECTED_STORIES}"
            --maximum-selected-stories "${MAXIMUM_SELECTED_STORIES}"
          )

          if [[ "${PIPELINE_MODE}" == "editorial_only" ]]; then
            args+=(--research-input "${RESEARCH_INPUT}")
          fi

          python automation/scripts/generate_digest_preview.py "${args[@]}"

      - name: Write run summary
        if: always()
        shell: bash
        env:
          PUBLICATION_DATE: ${{ steps.request.outputs.publication_date }}
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          date_value = os.environ.get("PUBLICATION_DATE", "")
          preview_dir = Path("automation/preview") / date_value
          run_info_path = preview_dir / "run-info.json"
          candidates_path = preview_dir / "candidates.json"
          selection_path = preview_dir / "selection.json"
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          lines = ["# Результат двухэтапного preview", ""]

          if not run_info_path.exists():
              lines.append("`run-info.json` не создан.")
          else:
              data = json.loads(run_info_path.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      f"- Статус: `{data.get('status')}`",
                      f"- Pipeline: `{data.get('pipeline')}`",
                      f"- Request ID: `{data.get('request_id')}`",
                      f"- Модель: `{data.get('model_requested')}`",
                      f"- Ошибка: `{data.get('error')}`",
                  ]
              )

              research = data.get("research") or {}
              editorial = data.get("editorial") or {}
              research_response = research.get("response") or {}
              editorial_response = editorial.get("response") or {}

              lines.extend(
                  [
                      "",
                      "## Этапы",
                      "",
                      f"- Research: `{research.get('status')}`",
                      f"- Web search calls: `{research_response.get('web_search_calls')}`",
                      f"- Editorial: `{editorial.get('status')}`",
                  ]
              )

              if candidates_path.exists():
                  candidates = json.loads(
                      candidates_path.read_text(encoding="utf-8")
                  ).get("candidates", [])
                  russian = sum(
                      1
                      for item in candidates
                      if item.get("geography") == "russia"
                  )
                  lines.extend(
                      [
                          f"- Кандидатов: `{len(candidates)}`",
                          f"- Российских кандидатов: `{russian}`",
                      ]
                  )

              if selection_path.exists():
                  selection = json.loads(
                      selection_path.read_text(encoding="utf-8")
                  )
                  lines.append(
                      "- Выбрано сюжетов: "
                      f"`{len(selection.get('selected_candidate_ids', []))}`"
                  )

              warnings = data.get("warnings") or []
              if warnings:
                  lines.extend(["", "## Предупреждения", ""])
                  lines.extend(f"- {item}" for item in warnings)

              lines.extend(["", "## Total usage", "", "```json"])
              lines.append(
                  json.dumps(
                      data.get("total_usage"),
                      ensure_ascii=False,
                      indent=2,
                  )
              )
              lines.append("```")

              lines.extend(["", "## Research usage", "", "```json"])
              lines.append(
                  json.dumps(
                      research_response.get("usage"),
                      ensure_ascii=False,
                      indent=2,
                  )
              )
              lines.append("```")

              lines.extend(["", "## Editorial usage", "", "```json"])
              lines.append(
                  json.dumps(
                      editorial_response.get("usage"),
                      ensure_ascii=False,
                      indent=2,
                  )
              )
              lines.append("```")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Verify that live posts were not changed
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "$(git status --porcelain -- posts/)" ]]; then
            echo "Защитная проверка: workflow изменил posts/." >&2
            git status --short -- posts/
            exit 1
          fi

          echo "Рабочий каталог posts/ не изменён."

      - name: Upload two-stage preview artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: two-stage-digest-${{ steps.request.outputs.publication_date }}-${{ steps.request.outputs.request_id }}-${{ github.sha }}
          path: |
            automation/requests/digest-preview.json
            automation/archive/index.json
            automation/fixtures/research/
            automation/preview/${{ steps.request.outputs.publication_date }}/
          if-no-files-found: warn
          retention-days: 7
