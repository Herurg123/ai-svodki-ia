name: Production orchestrator dry run

run-name: Blocked production orchestration dry run ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/config/orchestrator.json"
      - "automation/scripts/orchestrator_common.py"
      - "automation/scripts/create_publication_plan.py"
      - "automation/scripts/create_rollback_snapshot.py"
      - "automation/scripts/create_rollback_plan.py"
      - "automation/scripts/simulate_release_and_rollback.py"
      - "automation/scripts/validate_orchestrator_contract.py"
      - "automation/scripts/validate_workflow_safety.py"
      - "automation/tests/test_production_orchestrator.py"
      - "automation/specs/production-orchestrator.md"
      - "automation/specs/rollback-runbook.md"
      - "automation/config/release.json"
      - "automation/fixtures/release/**"
      - "automation/fixtures/editorial/2026-07-11/**"
      - ".github/workflows/production-orchestrator-dry-run.yml"
      - ".github/workflows/rollback-drill.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-orchestrator-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    name: Build blocked plan and prove rollback
    if: github.ref == 'refs/heads/automation-prep'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository read-only
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile orchestrator code
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/orchestrator_common.py \
            automation/scripts/create_publication_plan.py \
            automation/scripts/create_rollback_snapshot.py \
            automation/scripts/create_rollback_plan.py \
            automation/scripts/simulate_release_and_rollback.py \
            automation/scripts/validate_orchestrator_contract.py \
            automation/scripts/validate_workflow_safety.py \
            automation/tests/test_production_orchestrator.py

      - name: Run orchestrator unit tests
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest -v automation.tests.test_production_orchestrator

      - name: Materialize golden release source
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          rm -rf "${root}"
          mkdir -p "${root}"
          python automation/scripts/materialize_release_candidate.py \
            --release-fixture automation/fixtures/release/2026-07-11 \
            --editorial-source automation/fixtures/editorial/2026-07-11 \
            --output-dir "${root}/source" \
            --report "${root}/materialization.json"

      - name: Validate source and cover
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          python automation/scripts/validate_digest_artifact.py \
            --artifact-dir "${root}/source" \
            --report "${root}/editorial-artifact-validation.json"
          python automation/scripts/validate_cover_contract.py \
            --artifact-dir "${root}/source" \
            --report "${root}/cover-validation.json"

      - name: Build isolated candidate site
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          python automation/scripts/build_site.py \
            --source-dir "${root}/source" \
            --output-dir "${root}/site/posts" \
            --build-info "${root}/build-info.json"
          python automation/scripts/validate_site.py \
            --source-dir "${root}/source" \
            --site-dir "${root}/site/posts" \
            --report "${root}/site-validation.json"
          python automation/scripts/validate_dzen_feed.py \
            --rss "${root}/site/posts/rss.xml" \
            --report "${root}/dzen-feed-validation.json"

      - name: Create and validate release manifest
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          python automation/scripts/create_release_manifest.py \
            --source-dir "${root}/source" \
            --site-dir "${root}/site/posts" \
            --reports-dir "${root}" \
            --output "${root}/release-manifest.json"
          python automation/scripts/validate_release_candidate.py \
            --manifest "${root}/release-manifest.json" \
            --report "${root}/release-validation.json"

      - name: Confirm production gate remains blocked
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          python automation/scripts/validate_production_gate.py \
            --config automation/config/release.json \
            --manifest "${root}/release-manifest.json" \
            --actual-ref "${GITHUB_REF}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --manual-approval false \
            --expect-blocked \
            --report "${root}/gate-report.json"

      - name: Create blocked publication and rollback plans
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          python automation/scripts/create_publication_plan.py \
            --config automation/config/orchestrator.json \
            --release-manifest "${root}/release-manifest.json" \
            --gate-report "${root}/gate-report.json" \
            --live-dir posts \
            --candidate-dir "${root}/site/posts" \
            --output "${root}/publication-plan.json" \
            --expect-blocked
          python automation/scripts/create_rollback_snapshot.py \
            --live-dir posts \
            --output-dir "${root}/rollback-snapshot" \
            --manifest "${root}/rollback-snapshot.json"
          python automation/scripts/create_rollback_plan.py \
            --config automation/config/orchestrator.json \
            --snapshot-manifest "${root}/rollback-snapshot.json" \
            --post-release-dir "${root}/site/posts" \
            --output "${root}/rollback-plan.json" \
            --expect-blocked

      - name: Simulate release and rollback in preview only
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          python automation/scripts/simulate_release_and_rollback.py \
            --live-dir posts \
            --candidate-dir "${root}/site/posts" \
            --snapshot-dir "${root}/rollback-snapshot/posts" \
            --snapshot-manifest "${root}/rollback-snapshot.json" \
            --publication-plan "${root}/publication-plan.json" \
            --rollback-plan "${root}/rollback-plan.json" \
            --output-dir "${root}/simulation" \
            --report "${root}/rollback-drill.json"

      - name: Validate orchestrator contract
        shell: bash
        run: |
          set -euo pipefail
          root="automation/preview/production-orchestrator/2026-07-11"
          python automation/scripts/validate_orchestrator_contract.py \
            --config automation/config/orchestrator.json \
            --live-dir posts \
            --candidate-dir "${root}/site/posts" \
            --release-manifest "${root}/release-manifest.json" \
            --gate-report "${root}/gate-report.json" \
            --publication-plan "${root}/publication-plan.json" \
            --snapshot-manifest "${root}/rollback-snapshot.json" \
            --rollback-plan "${root}/rollback-plan.json" \
            --drill-report "${root}/rollback-drill.json" \
            --report "${root}/orchestrator-validation.json"
          python automation/scripts/validate_workflow_safety.py \
            --workflow .github/workflows/production-orchestrator-dry-run.yml \
            --workflow .github/workflows/rollback-drill.yml \
            --report "${root}/workflow-safety.json"

      - name: Verify protected paths stayed unchanged
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          protected=(
            posts/
            automation/requests/digest-preview.json
            automation/requests/image-preview.json
          )
          if [[ -n "$(git status --porcelain -- "${protected[@]}")" ]]; then
            echo "Dry run modified protected paths." >&2
            git status --short -- "${protected[@]}"
            exit 1
          fi
          echo "Protected paths are unchanged."

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Production orchestrator dry run"
            echo
            echo "- Production gate: blocked by design"
            echo "- Publication plan: blocked"
            echo "- Rollback plan: blocked"
            echo "- Release simulation: preview directory only"
            echo "- Rollback simulation: exact tree restoration required"
            echo "- Live posts: unchanged"
            echo "- Paid APIs: not used"
            echo "- Output: GitHub artifact only"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload orchestrator dry-run artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-orchestrator-dry-run-${{ github.sha }}
          path: automation/preview/production-orchestrator/2026-07-11/
          if-no-files-found: warn
          retention-days: 14
