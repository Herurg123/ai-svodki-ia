name: Image contract check
run-name: Offline image contract ${{ github.sha }}

on:
  push:
    branches:
      - automation-prep
    paths:
      - "automation/config/image.json"
      - "automation/fixtures/digest-preview/**"
      - "automation/scripts/editorial_policy.py"
      - "automation/scripts/materialize_fixture_preview.py"
      - "automation/scripts/materialize_cover_fixture.py"
      - "automation/scripts/validate_cover_contract.py"
      - "automation/tests/test_cover_contract.py"
      - "automation/specs/image-contract.md"
      - ".github/workflows/image-contract-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate offline cover artifact
    if: github.ref == 'refs/heads/automation-prep'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out automation-prep
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate safe execution context
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF}" == "refs/heads/automation-prep" ]]
          if [[ -n "$(git status --porcelain -- posts/ automation/requests/digest-preview.json)" ]]; then
            echo "Защищённые пути уже изменены до начала проверки." >&2
            git status --short -- posts/ automation/requests/digest-preview.json
            exit 1
          fi

      - name: Check Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            automation/scripts/editorial_policy.py \
            automation/scripts/materialize_fixture_preview.py \
            automation/scripts/materialize_cover_fixture.py \
            automation/scripts/validate_cover_contract.py \
            automation/tests/test_cover_contract.py

      - name: Run cover contract unit tests
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover \
            -s automation/tests \
            -p 'test_cover_contract.py' \
            -v

      - name: Materialize digest fixture
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/materialize_fixture_preview.py \
            --fixture automation/fixtures/digest-preview/2026-07-11/digest.json \
            --output-dir automation/preview/image-contract/2026-07-11

      - name: Materialize deterministic 1536x864 cover
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/materialize_cover_fixture.py \
            --artifact-dir automation/preview/image-contract/2026-07-11

      - name: Validate cover artifact contract
        shell: bash
        run: |
          set -euo pipefail
          python automation/scripts/validate_cover_contract.py \
            --artifact-dir automation/preview/image-contract/2026-07-11

      - name: Verify protected paths stayed unchanged
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain -- posts/ automation/requests/digest-preview.json)" ]]; then
            echo "Защитная проверка: workflow изменил production или paid request." >&2
            git status --short -- posts/ automation/requests/digest-preview.json
            exit 1
          fi
          echo "posts/ и paid request не изменены."

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Offline image contract"
            echo
            echo "- OpenAI API: not used"
            echo "- Network content generation: not used"
            echo "- Target PNG: 1536x864"
            echo "- Visual semantics validated: false"
            echo "- Production paths changed: no"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload image contract artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: image-contract-${{ github.sha }}
          path: automation/preview/image-contract/
          if-no-files-found: warn
          retention-days: 7
